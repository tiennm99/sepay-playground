name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format:check

      - name: Svelte check
        run: pnpm check

      - name: Build
        run: pnpm build
        env:
          SEPAY_WEBHOOK_API_KEY: ci-placeholder
          SEPAY_ACCOUNT_NUMBER: '0010000000000'
          SEPAY_BANK_CODE: Vietcombank
          SEPAY_ORDER_PREFIX: SEVQR
          DEV_SIMULATE_TOKEN: ci-placeholder
