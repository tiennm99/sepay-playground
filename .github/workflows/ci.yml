name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - name: pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - name: format
        run: pnpm format:check

      - name: svelte-check
        run: pnpm check

      - name: build
        run: pnpm build
        env:
          SEPAY_WEBHOOK_API_KEY: ci-placeholder
          SEPAY_ACCOUNT_NUMBER: '0010000000000'
          SEPAY_BANK_CODE: Vietcombank
          SEPAY_ORDER_PREFIX: SEVQR
          UPSTASH_REDIS_REST_URL: https://example.upstash.io
          UPSTASH_REDIS_REST_TOKEN: ci-placeholder
          DEV_SIMULATE_TOKEN: ci-placeholder
