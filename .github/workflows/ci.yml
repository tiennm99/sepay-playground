name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: format
        run: pnpm format:check

      - name: svelte-check
        run: pnpm check

      - name: build
        run: pnpm build
        env:
          SEPAY_WEBHOOK_API_KEY: ci-placeholder
          SEPAY_ACCOUNT_NUMBER: '0010000000000'
          SEPAY_BANK_CODE: Vietcombank
          SEPAY_ORDER_PREFIX: SEVQR
          UPSTASH_REDIS_REST_URL: https://example.upstash.io
          UPSTASH_REDIS_REST_TOKEN: ci-placeholder
          DEV_SIMULATE_TOKEN: ci-placeholder
